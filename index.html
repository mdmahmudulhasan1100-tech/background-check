    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "https://whitebridgefind.com/#website",
            "url": "https://whitebridgefind.com/",
            "name": "White Bridge Find",
            "description": "Authorized Screening Gateway for Tenant Screening, Background Checks & Credit History Verification",
            "publisher": {
              "@id": "https://whitebridgefind.com/#organization"
            },
            "potentialAction": {
              "@type": "SearchAction",
              "target": "https://whitebridgefind.com/?q={search_term_string}",
              "query-input": "required name=search_term_string"
            }
          },
          {
            "@type": "Organization",
            "@id": "https://whitebridgefind.com/#organization",
            "name": "White Bridge Find",
            "url": "https://whitebridgefind.com/",
            "logo": "https://whitebridgefind.com/favicon.svg",
            "contactPoint": {
              "@type": "ContactPoint",
              "contactType": "customer support",
              "email": "compliance@verifyapplicant.com"
            }
          },
          {
            "@type": "FAQPage",
            "@id": "https://whitebridgefind.com/#faq",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "How long does it take?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Most initial screening reports and identity checks return results within minutes. Comprehensive national criminal background checks or county courthouse records typically take between 1 to 24 business hours depending on the jurisdiction and specific report requirements."
                }
              },
              {
                "@type": "Question",
                "name": "What information is needed?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "To initiate a background check, you generally need the applicant’s full legal name, current residential address, date of birth, Social Security Number (SSN), and an active email address. FCRA-compliant authorization consent is also collected digitally during the application process."
                }
              },
              {
                "@type": "Question",
                "name": "Is my information secure?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. We utilize industry-standard 256-bit TLS/SSL encryption for all data transmission and storage. Sensitive personal identifiers such as Social Security Numbers are never stored in plain text and are processed strictly through SOC-2 and ISO-27001 certified secure partner clearinghouses."
                }
              },
              {
                "@type": "Question",
                "name": "Who uses this service?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Our secure gateway is trusted nationwide by residential landlords screening prospective tenants, professional property management firms, hiring managers and business owners vetting employment candidates, and cautious individuals verifying personal records."
                }
              }
            ]
          }
        ]
      }
    </script>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Gradient for background shield -->
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>
  
  <!-- Outer glowing background (soft) -->
  <rect width="100" height="100" rx="24" fill="#ffffff" />
  
  <!-- Shield path -->
  <path d="M50 15 C65 15, 78 20, 80 25 C82 45, 75 70, 50 85 C25 70, 18 45, 20 25 C22 20, 35 15, 50 15 Z" fill="url(#shieldGrad)" />
  
  <!-- Inner check mark path -->
  <path d="M38 50 L46 58 L62 38" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
</svg>
